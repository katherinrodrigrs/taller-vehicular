{% extends "base.html" %}

{% block contenido %}

<div class="titulo-pagina">
    <i class="fa-regular fa-clipboard"></i>
    Registro de datos
</div>

<div class="card-formulario">

    <form action="{{ url_for('guardar') }}" method="POST">

        <div class="fila-form">
            <label>Fecha</label>
            <input type="date" name="fecha" required>
        </div>

        <div class="fila-form">
            <label>Placa</label>
            <input type="text" name="placa" placeholder="Ej. ABC-123" required>
        </div>

        <div class="fila-form">
            <label>Cliente</label>
            <input type="text" name="cliente" placeholder="Nombre del cliente" required>
        </div>

        <div class="fila-form">
            <label>Modelo</label>
            <input type="text" name="modelo" placeholder="Ej. Toyota Corolla 2020" required>
        </div>

        <div class="fila-form">
            <label>Diagnóstico</label>
            <textarea name="diagnostico" placeholder="Descripción del diagnóstico" required></textarea>
        </div>

        <div class="fila-form">
            <label>Estado del vehículo</label>
            <select name="estado" required>
                <option value="Pendiente">Pendiente</option>
                <option value="En proceso">En proceso</option>
                <option value="Terminado">Terminado</option>
                <option value="Entregado">Entregado</option>
            </select>
        </div>

        <div class="fila-form">
            <label>Monto del servicio</label>
            <input type="number" name="monto" step="0.01" placeholder="Ej. 1500.00" required>
        </div>

        <div class="separador"></div>

        <button class="btn-guardar" type="submit">
            <i class="fa-regular fa-floppy-disk"></i>
            Guardar Registro
        </button>

    </form>

</div>

{% endblock %}
