<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Editar Registro</title>
    <style>
        body {
            font-family: Arial;
            background: #f2f2f2;
            padding: 20px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        button {
            background: orange;
            color: white;
            border: none;
            padding: 10px;
            width: 100%;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Editar Vehículo</h2>

    <form method="POST">
        <input type="text" name="placa" value="{{ registro.placa }}" required>
        <input type="text" name="cliente" value="{{ registro.cliente }}" required>
        <input type="text" name="servicio" value="{{ registro.servicio }}" required>
        <input type="number" name="monto" value="{{ registro.monto }}" required>

        <button type="submit">Actualizar</button>
    </form>
</div>

</body>
</html>
