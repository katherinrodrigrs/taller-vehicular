<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema Taller Vehicular</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>

<body>

<div class="contenedor">

    <!-- IMAGEN -->
    <div class="lado-izquierdo">
        <img src="{{ url_for('static', filename='taller.jpg') }}" alt="Taller">
    </div>

    <!-- LOGIN -->
    <div class="lado-derecho">

        <div class="login-box">

            <div class="logo">
                <i class="fas fa-cog"></i>
            </div>

            <h1>SISTEMA</h1>
            <h2>TALLER VEHICULAR</h2>

            <div class="linea"></div>

            <p>Control y gestión de servicios</p>

            <form method="POST">

                <label>USUARIO</label>

                <div class="input-box">
                    <i class="far fa-user"></i>
                    <input type="text"
                           name="usuario"
                           placeholder="Ingrese su usuario"
                           required>
                </div>

                <label>CONTRASEÑA</label>

                <div class="input-box">
                    <i class="fas fa-lock"></i>

                    <input type="password"
                           id="clave"
                           name="clave"
                           placeholder="Ingrese su contraseña"
                           required>

                    <span onclick="verClave()">
                        <i class="far fa-eye"></i>
                    </span>
                </div>

                <div class="extras">
                    <label>
                        <input type="checkbox">
                        Recordarme
                    </label>

                    <a href="#">¿Olvidó su contraseña?</a>
                </div>

                <button type="submit">
                    INGRESAR
                </button>

            </form>

            <div class="footer">
                Sistema seguro | © 2026 Taller Vehicular
            </div>

        </div>

    </div>

</div>

<script>
function verClave() {
    let input = document.getElementById("clave");

    if(input.type === "password"){
        input.type = "text";
    }else{
        input.type = "password";
    }
}
</script>

</body>
</html>
